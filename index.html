<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Idol Agency | Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-glow bg-1"></div>
  <div class="background-glow bg-2"></div>
  <div class="background-grid"></div>
  <div id="floatingField" class="floating-field" aria-hidden="true"></div>

  <header class="hero container">
    <p class="brand-tag">LOVE IDOL AGENCY</p>
    <h1>Game Platform</h1>
    <p class="hero-subtitle">
      Step into our game universe. Play Cipher right now.
    </p>
  </header>

  <main class="container">
    <section class="games-section">
      <div class="section-heading">
        <h2>Available Games</h2>
      </div>

      <div class="games-grid">
        <article class="game-card">
          <div class="cover-wrap">
            <img src="assets/cipher-cover.png" alt="Cipher game cover with mystical cube and runes" />
          </div>
          <div class="card-meta">
            <p class="status live">Live Now</p>
            <h3>Cipher</h3>
            <p class="description">
              Solve five layered clues and unlock the MONAFUKU decryption sequence.
            </p>
            <a class="card-action" href="games/cipher/index.html">Launch Game</a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="container footer">
    <p>(c) 2026 Love Idol Agency. All rights reserved.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
